<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <a href="/" class="logo">blog</a>
  </header>

  <main>
    <h1 class="page-heading">New Post</h1>

    <form id="post-form">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" placeholder="Post title" required>

      <label for="excerpt">Excerpt <span class="optional">(optional)</span></label>
      <input type="text" id="excerpt" name="excerpt" placeholder="Short summary">

      <label for="body">Body</label>
      <textarea id="body" name="body" rows="14" placeholder="Write your post..." required></textarea>

      <div class="form-actions">
        <button type="submit" class="btn-primary">Publish</button>
        <a href="/" class="btn-cancel">Cancel</a>
      </div>

      <p id="form-error" class="form-error"></p>
    </form>
  </main>

  <footer>
    <span>&copy; 2026</span>
  </footer>

  <script>
    const form = document.getElementById("post-form");
    const errorEl = document.getElementById("form-error");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.textContent = "";

      const title = document.getElementById("title").value.trim();
      const excerpt = document.getElementById("excerpt").value.trim();
      const body = document.getElementById("body").value.trim();

      const response = await fetch("/api/posts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, excerpt: excerpt || undefined, body }),
      });

      const data = await response.json();

      if (!response.ok) {
        errorEl.textContent = data.error;
        return;
      }

      // Redirect to the new post
      window.location.href = "/post/" + data.slug;
    });
  </script>
</body>
</html>
